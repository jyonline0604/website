<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港城市儀表板 | 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        nav a {
            color: #a0a0a0;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        nav a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #00d4ff;
        }

        nav a.active {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.1) 0%, transparent 100%);
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            color: #888;
            font-size: 1rem;
        }

        .last-update {
            margin-top: 15px;
            color: #00d4ff;
            font-size: 0.9rem;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        /* Card Styles */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-icon {
            font-size: 2rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .card-subtitle {
            font-size: 0.85rem;
            color: #666;
        }

        /* AQHI Card */
        .aqhi-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .aqhi-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .aqhi-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
        }

        .aqhi-value {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .aqhi-risk {
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* Traffic Light Colors */
        .light-green { color: #00ff88; } /* 暢通 */
        .light-yellow { color: #ffcc00; } /* 正常 */
        .light-red { color: #ff4444; } /* 緩慢 */
        .light-purple { color: #aa44ff; } /* 嚴重 */

        /* Journey Time List */
        .journey-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .journey-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .journey-item:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .journey-route {
            flex: 1;
        }

        .journey-from {
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .journey-to {
            font-size: 0.8rem;
            color: #888;
        }

        .journey-time {
            text-align: right;
            margin-left: 15px;
        }

        .journey-minutes {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .journey-unit {
            font-size: 0.75rem;
            color: #888;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }

        footer a {
            color: #00d4ff;
            text-decoration: none;
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            color: #666;
        }

        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.5rem;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
            }

            nav {
                justify-content: center;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .aqhi-content {
                grid-template-columns: 1fr;
            }
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* MTR Section */
        .mtr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .mtr-line {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
        }

        .mtr-line-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .mtr-station {
            margin-bottom: 8px;
        }

        .mtr-station-name {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 3px;
        }

        .mtr-trains {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mtr-train {
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .mtr-train-time {
            color: #00d4ff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="home.html" class="logo">
                <span>📖</span>
                <span>科技修真傳</span>
            </a>
            <nav>
                <a href="home.html">首頁</a>
                <a href="chapters.html">章節</a>
                <a href="news.html">AI 新聞</a>
                <a href="finance.html">財經</a>
                <a href="https://itv.kofhk.com/" target="_blank">ITV</a>
                <a href="author.html">作者</a>
                <a href="dashboard.html" class="active">城市儀表板</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <h1>🌆 香港城市儀表板</h1>
        <p>實時城市數據｜每2分鐘更新</p>
        <div class="last-update" id="lastUpdate">載入中...</div>
    </section>

    <main class="container">
        <div class="dashboard-grid">
            <!-- AQHI 空氣質素健康指數 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🌬️</span>
                    <div>
                        <div class="card-title">空氣質素健康指數 (AQHI)</div>
                        <div class="card-subtitle">環境保護署 | 每小時更新</div>
                    </div>
                </div>
                <div class="aqhi-content" id="aqhiData">
                    <div class="loading">載入數據</div>
                </div>
            </div>

            <!-- MTR 港鐵列車到站 -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <span class="card-icon">🚇</span>
                    <div>
                        <div class="card-title">港鐵列車到站時間</div>
                        <div class="card-subtitle">MTR 實時數據</div>
                    </div>
                </div>
                <div class="mtr-grid" id="mtrData">
                    <div class="loading">載入港鐵數據</div>
                </div>
            </div>

            <!-- 行車時間顯示器 -->
            <div class="card" style="grid-column: 1 / -1;">
                <div class="card-header">
                    <span class="card-icon">🚗</span>
                    <div>
                        <div class="card-title">行車時間顯示器（第二代）</div>
                        <div class="card-subtitle">運輸署 | 每2分鐘更新</div>
                    </div>
                </div>
                <div class="journey-list" id="journeyData">
                    <div class="loading">載入實時數據</div>
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="light-green">●</span> 暢通</div>
                    <div class="legend-item"><span class="light-yellow">●</span> 正常</div>
                    <div class="legend-item"><span class="light-red">●</span> 緩慢</div>
                    <div class="legend-item"><span class="light-purple">●</span> 嚴重</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>數據來源：<a href="https://data.gov.hk" target="_blank">DATA.GOV.HK</a> 香港政府開放數據平台</p>
        <p>© 2026 科技修真傳 | 作者：大肥喵</p>
    </footer>

    <script>
        // 更新時間
        const now = new Date();
        document.getElementById('lastUpdate').textContent = `最後更新：${now.toLocaleString('zh-TW')}`;

        // 位置代碼映射
        const locationNames = {
            'H1': '告士打道(中環)',
            'H2': '告士打道(灣仔)',
            'H3': '干諾道中',
            'H4': '海底隧道口',
            'H5': '西隧入口',
            'H6': '東隧入口',
            'H7': '獅子山隧道',
            'H8': '城門隧道',
            'H9': '大老山隧道',
            'H10': '海底隧道-香港',
            'H11': '海底隧道-九龍',
            'H12': '大潭道',
            'H13': '淺水灣道',
            'H14': '赤柱道',
            'K01': '九龍幹道A',
            'K02': '九龍幹道B',
            'K03': '九龍幹道C',
            'K04': '九龍幹道D',
            'K05': '九龍幹道E',
            'K06': '九龍幹道F',
            'K07': '九龍幹道G',
            'K08': '九龍幹道H',
            'N01': '北區幹道A',
            'N02': '北區幹道B',
            'N03': '北區幹道C',
            'N05': '北區幹道E',
            'N06': '北區幹道F',
            'N07': '北區幹道G',
            'N08': '將軍澳道',
            'N09': '環保大道',
            'N10': '寶順路',
            'N11': '環保大道(南)',
            'N12': '將軍澳隧道',
            'N13': '環保大道(東)',
            'SJ1': '將軍澳南',
            'SJ2': '將軍澳中央',
            'SJ3': '觀塘道(東)',
            'SJ4': '將軍澳(北)',
            'SJ5': '將軍澳(西)',
        };

        // 目的地代碼映射
        const destNames = {
            'CH': '紅隧',
            'EH': '東隧',
            'WH': '西隧',
            'SHT': '獅隧',
            'CTT': '城隧',
            'TTL': '大老山',
            'ABT': '機場',
            'WNCG': '東涌',
            'PFL': '坪石',
            'ATL': '屯門',
            'TMCLK': '天水圍',
            'SSCPR': '上水',
            'SSYLH': '石湖墟',
            'TLH': '大埔',
            'TPR': '大埔(北)',
            'KTPR': '科學園',
            'TSCA': '科技園',
            'CWBR': '長江',
            'MOS': '馬鞍山',
            'TKOLTT': '將軍澳市中心',
            'TKOT': '調景嶺',
            'ATL': '屯門',
            'LRT': '輕鐵',
            'SMT': '坑口',
            'TCT': '翠琳',
            'TWCP': '屯門(西)',
            'TWTM': '屯門(東)',
            'TKTM': '將軍澳(東)',
            'TKTL': '將軍澳(南)',
            'ACT': '數據中心',
            'ATSCA': '科技園(北)',
        };

        // 顏色類別
        function getColorClass(colourId) {
            switch(colourId) {
                case '1': return 'light-green';
                case '2': return 'light-yellow';
                case '3': return 'light-red';
                case '4': return 'light-purple';
                default: return 'light-yellow';
            }
        }

        function getColorDot(colourId) {
            switch(colourId) {
                case '1': return '🟢';
                case '2': return '🟡';
                case '3': return '🔴';
                case '4': return '🟣';
                default: return '⚪';
            }
        }

        // 載入 AQHI 數據
        async function loadAQHI() {
            try {
                const response = await fetch('https://datagovhk.blob.core.windows.net/dataset/aqhi/aqhi.json');
                const data = await response.json();
                
                let html = '';
                for (const item of data) {
                    const typeName = item.type === 'general' ? '一般地區' : '路邊';
                    const aqhiValue = item.aqhi_max;
                    
                    let riskClass = 'light-green';
                    let riskText = item.health_risk_max;
                    if (aqhiValue >= 4) riskClass = 'light-yellow';
                    if (aqhiValue >= 7) riskClass = 'light-red';
                    if (aqhiValue >= 10) riskClass = 'light-purple';
                    
                    html += `
                        <div class="aqhi-item">
                            <div class="aqhi-label">${typeName}</div>
                            <div class="aqhi-value ${riskClass}">${aqhiValue}</div>
                            <span class="aqhi-risk">${riskText}</span>
                        </div>
                    `;
                }
                document.getElementById('aqhiData').innerHTML = html;
            } catch (error) {
                document.getElementById('aqhiData').innerHTML = '<div class="empty-state">無法載入數據</div>';
            }
        }

        // 載入行車時間數據
        async function loadJourneyTime() {
            try {
                const response = await fetch('https://resource.data.one.gov.hk/td/jss/Journeytimev2.xml');
                const text = await response.text();
                
                // 解析 XML
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                const items = xml.querySelectorAll('jtis_journey_time');
                
                // 過濾有意義的路線（避免重複太多）
                const seen = new Set();
                const routes = [];
                
                items.forEach(item => {
                    const locId = item.querySelector('LOCATION_ID').textContent;
                    const destId = item.querySelector('DESTINATION_ID').textContent;
                    const key = locId + '-' + destId;
                    
                    if (!seen.has(key)) {
                        seen.add(key);
                        routes.push({
                            locId,
                            destId,
                            time: item.querySelector('JOURNEY_DATA').textContent,
                            colour: item.querySelector('COLOUR_ID').textContent
                        });
                    }
                });
                
                // 顯示前30條主要路線
                let html = '';
                const displayRoutes = routes.slice(0, 30);
                
                displayRoutes.forEach(route => {
                    const fromName = locationNames[route.locId] || route.locId;
                    const toName = destNames[route.destId] || route.destId;
                    const colorClass = getColorClass(route.colour);
                    const colorDot = getColorDot(route.colour);
                    
                    html += `
                        <div class="journey-item">
                            <div class="journey-route">
                                <div class="journey-from">${fromName}</div>
                                <div class="journey-to">→ ${toName}</div>
                            </div>
                            <div class="journey-time">
                                <div class="journey-minutes ${colorClass}">${route.time}</div>
                                <div class="journey-unit">分鐘</div>
                            </div>
                        </div>
                    `;
                });
                
                if (html === '') {
                    html = '<div class="empty-state">暫無數據</div>';
                }
                
                document.getElementById('journeyData').innerHTML = html;
                
            } catch (error) {
                console.error('Error loading journey time:', error);
                document.getElementById('journeyData').innerHTML = '<div class="empty-state">無法載入數據</div>';
            }
        }

        // MTR 線路配置
        const mtrLines = [
            { name: '將軍澳線', line: 'TKL', stations: [{code: 'TKO', name: '將軍澳'}, {code: 'LHP', name: '寶琳'}] },
            { name: '港島線', line: 'ISL', stations: [{code: 'CEN', name: '中環'}, {code: 'CAB', name: '銅鑼灣'}] },
            { name: '觀塘線', line: 'KLT', stations: [{code: 'KOT', name: '觀塘'}] },
            { name: '東鐵線', line: 'EAL', stations: [{code: 'KOW', name: '九龍塘'}, {code: 'FAN', name: '火炭'}] },
            { name: '荃灣線', line: 'TWL', stations: [{code: 'TST', name: '尖沙咀'}] },
            { name: '東涌線', line: 'TCL', stations: [{code: 'KOW', name: '九龍'}] },
        ];

        // MTR 目的地翻譯
        const mtrDestNames = {
            'POA': '寶琳', 'LHP': '康城', 'TIK': '調景嶺', 'NOP': '北角',
            'TST': '尖沙咀', 'CEN': '中環', 'ADM': '金鐘', 'CAB': '銅鑼灣',
            'SYP': '筲箕灣', 'CHW': '柴灣', 'KOT': '觀塘', 'WHA': '黃埔',
            'HRT': '紅磡', 'KOW': '九龍', 'SHT': '沙田', 'FAN': '火炭',
            'TWO': '上水', 'LOR': '羅湖', 'LMC': '落馬洲', 'MOS': '馬鞍山',
            'SKM': '石門', 'YAT': '油塘', 'NTK': '牛頭山', 'KWH': '葵涌',
            'CSI': '南昌', 'STY': '洪水橋', 'TUM': '屯門', 'SIH': '石崗',
            'AOM': '元朗', 'ETS': '東鐵', 'SHA': '大嶼山', 'OCL': '東涌'
        };

        // 載入 MTR 數據
        async function loadMTR() {
            try {
                let html = '';
                
                for (const mtrLine of mtrLines) {
                    for (const station of mtrLine.stations) {
                        try {
                            const url = `https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${mtrLine.line}&sta=${station.code}&lang=tc`;
                            const response = await fetch(url);
                            const data = await response.json();
                            
                            if (data.data) {
                                const stationKey = `${mtrLine.line}-${station.code}`;
                                const stationData = data.data[stationKey];
                                
                                if (stationData) {
                                    const upTrains = stationData.UP || [];
                                    const downTrains = stationData.DOWN || [];
                                    
                                    // 只顯示有數據的方向
                                    const upHTML = upTrains.slice(0, 2).map(t => {
                                        const dest = mtrDestNames[t.dest] || t.dest;
                                        const ttnt = parseInt(t.ttnt);
                                        if (ttnt <= 0 || ttnt > 30) return '';
                                        return `<span class="mtr-train">${dest} ${ttnt}分</span>`;
                                    }).join('');
                                    
                                    const downHTML = downTrains.slice(0, 2).map(t => {
                                        const dest = mtrDestNames[t.dest] || t.dest;
                                        const ttnt = parseInt(t.ttnt);
                                        if (ttnt <= 0 || ttnt > 30) return '';
                                        return `<span class="mtr-train">${dest} ${ttnt}分</span>`;
                                    }).join('');
                                    
                                    if (upHTML || downHTML) {
                                        html += `
                                            <div class="mtr-line">
                                                <div class="mtr-line-name">${mtrLine.name} - ${station.name}</div>
                                                ${upHTML ? `<div class="mtr-trains">${upHTML}</div>` : ''}
                                                ${downHTML ? `<div class="mtr-trains" style="margin-top:5px;">↓ ${downHTML}</div>` : ''}
                                            </div>
                                        `;
                                    }
                                }
                            }
                        } catch (e) {
                            console.error(`Error loading ${mtrLine.name} ${station.name}:`, e);
                        }
                    }
                }
                
                if (html === '') {
                    html = '<div class="empty-state">無法載入數據</div>';
                }
                
                document.getElementById('mtrData').innerHTML = html;
            } catch (error) {
                console.error('Error loading MTR:', error);
                document.getElementById('mtrData').innerHTML = '<div class="empty-state">無法載入數據</div>';
            }
        }

        // 初始化
        loadAQHI();
        loadMTR();
        loadJourneyTime();
        
        // 每1分鐘刷新 MTR 數據
        setInterval(loadMTR, 60000);
        // 每2分鐘刷新行車時間
        setInterval(loadJourneyTime, 120000);
    </script>
</body>
</html>
