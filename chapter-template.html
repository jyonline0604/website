<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第{CHAPTER_NUM}章：{CHAPTER_TITLE} - 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFBFC;
            --text: #1F2937;
            --accent: #6366F1;
            --border: #E5E7EB;
        }

        [data-theme="dark"] {
            --bg: #1A1F26;
            --text: #F9FAFB;
            --border: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding: 0;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .chapter-title {
            font-size: 1rem;
            color: var(--text);
            font-weight: 500;
        }

        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 120px;
        }

        .chapter-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .chapter-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
        }

        .content {
            text-align: justify;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .content p {
            margin-bottom: 1.2em;
            text-indent: 2em;
        }

        .content p:first-of-type::first-letter {
            font-size: 1.3em;
            font-weight: 700;
            float: left;
            line-height: 1;
            margin-right: 2px;
            color: var(--accent);
        }

        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 12px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .nav a:hover {
            background: var(--border);
        }

        .nav-center {
            color: var(--text);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .main {
                padding: 72px 16px 100px;
            }

            .chapter-header h1 {
                font-size: 1.5rem;
            }

            .content {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="chapters.html">← 章節目錄</a>
        <span class="chapter-title">第{CHAPTER_NUM}章</span>
        <a href="chapter-{PREV_NUM}.html">上一章</a>
    </header>

    <main class="main">
        <header class="chapter-header">
            <h1>第{CHAPTER_NUM}章：{CHAPTER_TITLE}</h1>
        </header>

        <div class="content">
{CONTENT}
        </div>
    </main>

    <nav class="nav">
        <a href="chapter-{PREV_NUM}.html">← 上一章</a>
        <span class="nav-center">第 {CHAPTER_NUM} / 61 章</span>
        <a href="chapter-{NEXT_NUM}.html">下一章 →</a>
    </nav>
</body>
</html>
