<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港城市儀表板 | 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f1923;
            min-height: 100vh;
            color: #e4e4e4;
            line-height: 1.6;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: #00d4ff;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 5px;
        }

        nav a {
            color: #888;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        nav a:hover, nav a.active {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        /* Main Container */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Title */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .page-title .update-time {
            color: #666;
            font-size: 0.9rem;
        }

        /* Section Title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin: 25px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .icon {
            font-size: 1.3rem;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-1 {
            grid-column: 1 / -1;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 1.1rem;
        }

        /* AQHI - App Style */
        .aqhi-main {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .aqhi-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .aqhi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .aqhi-card.general::before { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .aqhi-card.roadside::before { background: linear-gradient(90deg, #FF9800, #FFC107); }

        .aqhi-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .aqhi-value {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 10px;
        }

        .aqhi-risk {
            font-size: 0.8rem;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }

        .aqhi-risk.green { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .aqhi-risk.yellow { background: rgba(255, 152, 0, 0.2); color: #FF9800; }
        .aqhi-risk.orange { background: rgba(255, 87, 34, 0.2); color: #FF5722; }
        .aqhi-risk.red { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .aqhi-risk.purple { background: rgba(156, 39, 176, 0.2); color: #9C27B0; }
        .aqhi-risk.black { background: rgba(0, 0, 0, 0.5); color: #fff; }

        /* District Grid */
        .district-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .district-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }

        .district-name {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 5px;
        }

        .district-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .aqhi-green { color: #4CAF50; }
        .aqhi-yellow { color: #FF9800; }
        .aqhi-orange { color: #FF5722; }
        .aqhi-red { color: #F44336; }
        .aqhi-purple { color: #9C27B0; }

        .risk-low { color: #00ff88; background: rgba(0, 255, 136, 0.15); }
        .risk-moderate { color: #ffcc00; background: rgba(255, 204, 0, 0.15); }
        .risk-high { color: #ff6600; background: rgba(255, 102, 0, 0.15); }
        .aqhi-green { color: #00ff88; }
        .aqhi-yellow { color: #ffcc00; }
        .aqhi-orange { color: #ff8844; }
        .aqhi-red { color: #ff4444; }
        .aqhi-purple { color: #aa44ff; }

        

        /* Weather Forecast */
        .forecast-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .forecast-item {
            min-width: 100px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .forecast-week {
            font-weight: 600;
            color: #00d4ff;
            font-size: 0.9rem;
        }

        .forecast-date {
            font-size: 0.75rem;
            color: #555;
            margin: 5px 0;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .forecast-desc {
            font-size: 0.75rem;
            color: #666;
            margin-top: 5px;
        }

        /* Transport */
        .transport-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .transport-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transport-name {
            font-weight: 500;
            color: #fff;
        }

        .transport-time {
            color: #00d4ff;
            font-weight: 600;
        }

        /* Journey Time */
        .journey-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
        }

        .journey-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .journey-route {
            font-size: 0.85rem;
        }

        .journey-from {
            color: #fff;
        }

        .journey-to {
            color: #666;
            font-size: 0.75rem;
        }

        .journey-time {
            text-align: right;
        }

        .journey-mins {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .journey-unit {
            font-size: 0.7rem;
            color: #555;
        }

        .journey-green { color: #00ff88; }
        .journey-yellow { color: #ffcc00; }
        .journey-red { color: #ff4444; }
        .journey-purple { color: #aa44ff; }

        /* Hospital */
        .hospital-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
        }

        .hospital-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hospital-name {
            font-size: 0.85rem;
            color: #fff;
        }

        .hospital-link {
            font-size: 0.75rem;
            color: #00d4ff;
            text-decoration: none;
        }

        .hospital-link:hover {
            text-decoration: underline;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: #555;
            padding: 20px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .aqhi-box {
                flex-direction: column;
            }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 40px;
        }

        footer a {
            color: #00d4ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="home.html" class="logo">📖 科技修真傳</a>
            <nav class="nav">
                <a href="home.html">首頁</a>
                <a href="chapters.html">章節</a>
                <a href="news.html">AI 新聞</a>
                <a href="finance.html">財經</a>
                <a href="https://itv.kofhk.com/" target="_blank">ITV</a>
                <a href="author.html">作者</a>
                <a href="dashboard.html" class="active">城市儀表板</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="page-title">
            <h1>🌆 香港城市儀表板</h1>
            <div class="update-time" id="updateTime">載入中...</div>
        </div>

        <!-- 天氣及環境 -->
        <div class="section-title">
            <span class="icon">🌤️</span>
            天氣及環境
        </div>
        <div class="grid">
            <div class="card grid-2">
                <div class="card-title">
                    <span class="icon">🌡️</span>
                    天氣預報（九日）
                </div>
                <div class="forecast-list" id="forecastData">
                    <div class="loading">載入天氣預報</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">
                    <span class="icon">🌬️</span>
                    空氣質素健康指數 (AQHI)
                </div>
                <div class="aqhi-main" id="aqhiMain">
                    <div class="loading">載入 AQHI</div>
                </div>
                
            </div>
        </div>

        <!-- 交通 -->
        <div class="section-title">
            <span class="icon">🚇</span>
            公共交通
        </div>
        <div class="grid">
            <div class="card">
                <div class="card-title">
                    <span class="icon">🚇</span>
                    港鐵列車到站
                </div>
                <div class="transport-list" id="mtrData">
                    <div class="loading">載入港鐵數據</div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">
                    <span class="icon">🚊</span>
                    輕鐵到站（屯門碼頭）
                </div>
                <div class="transport-list" id="lrtData">
                    <div class="loading">載入輕鐵數據</div>
                </div>
            </div>
            <div class="card grid-1">
                <div class="card-title">
                    <span class="icon">🚗</span>
                    行車時間顯示器
                    <span style="font-size:0.7rem;color:#666;margin-left:10px;">每2分鐘自動刷新</span>
                </div>
                <div class="journey-list" id="journeyData">
                    <div class="loading">載入行車時間</div>
                </div>
                <div style="margin-top:10px;font-size:0.75rem;color:#666;display:flex;gap:15px;">
                    <span>🟢暢通</span>
                    <span>🟡正常</span>
                    <span>🔴緩慢</span>
                    <span>🟣嚴重</span>
                </div>
            </div>
        </div>

        <!-- 醫療 -->
        <div class="section-title">
            <span class="icon">🏥</span>
            醫療服務
        </div>
        <div class="grid">
            <div class="card grid-1">
                <div class="card-title">
                    <span class="icon">🏥</span>
                    醫院急症室
                </div>
                <div class="hospital-list" id="hospitalData">
                    <div class="loading">載入醫院數據</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>數據來源：<a href="https://data.gov.hk" target="_blank">DATA.GOV.HK</a> 香港政府開放數據平台</p>
            <p>© 2026 科技修真傳 | 作者：大肥喵</p>
        </footer>
    </main>

    <script>
        // 更新時間
        document.getElementById('updateTime').textContent = `最後更新：${new Date().toLocaleString('zh-TW')}`;

        // ========== AQHI ==========
        async function loadAQHI() {
            try {
                const r = await fetch('https://datagovhk.blob.core.windows.net/dataset/aqhi/aqhi.json');
                const data = await r.json();
                
                let html = '';
                for (const item of data) {
                    const type = item.type === 'general' ? '一般監測站' : '路邊監測站';
                    const val = item.aqhi_max;
                    const risk = item.health_risk_max;
                    
                    let cls = 'aqhi-green';
                    let riskCls = 'green';
                    if (val >= 4) { cls = 'aqhi-yellow'; riskCls = 'yellow'; }
                    if (val >= 7) { cls = 'aqhi-orange'; riskCls = 'orange'; }
                    if (val >= 10) { cls = 'aqhi-red'; riskCls = 'red'; }
                    
                    html += `
                        <div class="aqhi-card ${item.type === 'general' ? 'general' : 'roadside'}">
                            <div class="aqhi-label">${type}</div>
                            <div class="aqhi-value ${cls}">${val}</div>
                            <span class="aqhi-risk ${riskCls}">${risk}</span>
                        </div>
                    `;
                }
                document.getElementById('aqhiMain').innerHTML = html;
            } catch (e) {
                document.getElementById('aqhiMain').innerHTML = '<div class="loading">無法載入</div>';
            }
        }

        

        // ========== 天氣預報 ==========
        async function loadForecast() {
            try {
                const r = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
                const data = await r.json();
                
                let html = '';
                for (const f of data.weatherForecast.slice(0, 9)) {
                    const d = f.forecastDate;
                    const dateStr = `${d.substr(0,4)}/${d.substr(4,2)}/${d.substr(6,2)}`;
                    html += `
                        <div class="forecast-item">
                            <div class="forecast-week">${f.week}</div>
                            <div class="forecast-date">${dateStr}</div>
                            <div class="forecast-temp">${f.forecastMintemp.value}° - ${f.forecastMaxtemp.value}°C</div>
                            <div class="forecast-desc">${f.forecastWeather}</div>
                        </div>
                    `;
                }
                document.getElementById('forecastData').innerHTML = html;
            } catch (e) {
                document.getElementById('forecastData').innerHTML = '<div class="loading">無法載入</div>';
            }
        }

        // ========== MTR ==========
        const mtrLines = [
            { name: '將軍澳線', line: 'TKL', sta: 'TKO', staName: '將軍澳' },
            { name: '港島線', line: 'ISL', sta: 'CEN', staName: '中環' },
            { name: '觀塘線', line: 'KLT', sta: 'KOT', staName: '觀塘' },
            { name: '東鐵線', line: 'EAL', sta: 'KOW', staName: '九龍塘' },
        ];
        
        const destNames = {
            'POA': '寶琳', 'LHP': '康城', 'TIK': '調景嶺', 'NOP': '北角',
            'TST': '尖沙咀', 'CEN': '中環', 'ADM': '金鐘', 'CAB': '銅鑼灣',
            'CHW': '柴灣', 'KOT': '觀塘', 'HRT': '紅磡', 'KOW': '九龍'
        };

        async function loadMTR() {
            let html = '';
            for (const l of mtrLines) {
                try {
                    const r = await fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${l.line}&sta=${l.sta}&lang=tc`);
                    const data = await r.json();
                    
                    if (data.data) {
                        const key = `${l.line}-${l.sta}`;
                        const sd = data.data[key];
                        if (sd) {
                            const trains = [...(sd.UP || []), ...(sd.DOWN || [])].slice(0, 2);
                            for (const t of trains) {
                                const dest = destNames[t.dest] || t.dest;
                                const ttnt = parseInt(t.ttnt);
                                if (ttnt > 0 && ttnt <= 30) {
                                    html += `
                                        <div class="transport-item">
                                            <span class="transport-name">${l.name} ${l.staName}</span>
                                            <span class="transport-time">→ ${dest} ${ttnt}分</span>
                                        </div>
                                    `;
                                }
                            }
                        }
                    }
                } catch (e) {}
            }
            if (!html) html = '<div class="loading">無法載入</div>';
            document.getElementById('mtrData').innerHTML = html;
        }

        // ========== 輕鐵 ==========
        async function loadLRT() {
            try {
                const r = await fetch('https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=1');
                const data = await r.json();
                
                let html = '';
                if (data.platform_list) {
                    let count = 0;
                    for (const p of data.platform_list) {
                        for (const route of (p.route_list || [])) {
                            if (route.dest_ch && route.time_ch && count < 6) {
                                html += `
                                    <div class="transport-item">
                                        <span class="transport-name">輕鐵 ${route.route_no}</span>
                                        <span class="transport-time">→ ${route.dest_ch} ${route.time_ch}</span>
                                    </div>
                                `;
                                count++;
                            }
                        }
                    }
                }
                if (!html) html = '<div class="loading">無數據</div>';
                document.getElementById('lrtData').innerHTML = html;
            } catch (e) {
                document.getElementById('lrtData').innerHTML = '<div class="loading">無法載入</div>';
            }
        }

        // ========== 行車時間 ==========
        const locNames = {
            'H1': '告士打道→', 'H2': '告士打道→', 'H3': '干諾道中→',
            'H4': '海底隧道→', 'H5': '西隧→', 'H6': '東隧→',
            'H7': '獅隧→', 'H8': '城隧→', 'H9': '大老山→'
        };
        const destMap = {
            'CH': '紅隧', 'EH': '東隧', 'WH': '西隧', 'SHT': '獅隧',
            'CTT': '城隧', 'TTL': '大老山', 'ABT': '機場'
        };

        async function loadJourney() {
            try {
                const r = await fetch('https://resource.data.one.gov.hk/td/jss/Journeytimev2.xml');
                const text = await r.text();
                
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, 'text/xml');
                const items = xml.querySelectorAll('jtis_journey_time');
                
                let html = '';
                let count = 0;
                for (const item of items) {
                    const loc = item.querySelector('LOCATION_ID').textContent;
                    const dest = item.querySelector('DESTINATION_ID').textContent;
                    const time = item.querySelector('JOURNEY_DATA').textContent;
                    const color = item.querySelector('COLOUR_ID').textContent;
                    
                    const locName = locNames[loc] || loc + '→';
                    const destName = destMap[dest] || dest;
                    
                    const colorCls = color === '1' ? 'journey-green' : color === '2' ? 'journey-yellow' : color === '3' ? 'journey-red' : 'journey-purple';
                    
                    html += `
                        <div class="journey-item">
                            <div class="journey-route">
                                <div class="journey-from">${locName} ${destName}</div>
                            </div>
                            <div class="journey-time">
                                <span class="journey-mins ${colorCls}">${time}</span>
                                <span class="journey-unit">分鐘</span>
                            </div>
                        </div>
                    `;
                    count++;
                    if (count >= 25) break;
                }
                if (!html) html = '<div class="loading">無數據</div>';
                document.getElementById('journeyData').innerHTML = html;
            } catch (e) {
                document.getElementById('journeyData').innerHTML = '<div class="loading">無法載入</div>';
            }
        }

        // ========== 醫院 ==========
        async function loadHospitals() {
            try {
                const datasetId = 'fhb_rcd_1636947932221_94410';
                const r = await fetch(`https://portal.csdi.gov.hk/server/services/common/${datasetId}/MapServer/WFSServer?service=wfs&version=2.0.0&request=GetFeature&typename=geotagging&outputFormat=geojson`);
                const data = await r.json();
                
                let html = '';
                for (const f of data.features.slice(0, 18)) {
                    const p = f.properties;
                    const name = p.hospName_TC || p.hospName_EN || '';
                    const link = p.JSON_TC || '#';
                    
                    if (name) {
                        html += `
                            <div class="hospital-item">
                                <span class="hospital-name">${name}</span>
                                <a href="${link}" target="_blank" class="hospital-link">急症室等候 →</a>
                            </div>
                        `;
                    }
                }
                if (!html) html = '<div class="loading">無數據</div>';
                document.getElementById('hospitalData').innerHTML = html;
            } catch (e) {
                document.getElementById('hospitalData').innerHTML = '<div class="loading">無法載入</div>';
            }
        }

        // 初始化
        loadAQHI();
        
        loadForecast();
        loadMTR();
        loadLRT();
        loadJourney();
        loadHospitals();

        // 每分鐘刷新
        setInterval(loadMTR, 60000);
        setInterval(loadLRT, 60000);
        setInterval(loadJourney, 120000);
    </script>
</body>
</html>
