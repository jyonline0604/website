<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新聞 - 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #08080d;
            --bg-secondary: #101016;
            --bg-tertiary: #181820;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(180, 180, 200, 0.9);
            --text-tertiary: rgba(120, 120, 140, 0.8);
            --accent: #6366f1;
            --accent-light: rgba(99, 102, 241, 0.2);
            --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --border: rgba(255,255,255,0.1);
            --card-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4)), /* 進一步調亮：30%-40%遮罩 */
                url("assets/news-bg.jpg") center center / cover;
            z-index: -1;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(20, 20, 30, 0.8); /* 稍微調亮 */
            backdrop-filter: blur(30px); /* 增強毛玻璃 */
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0 24px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.25);
        }

        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            height: 64px;
        }

        .logo {
            font-size: 1.3rem; font-weight: 700; color: #fff;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--gradient); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .nav { display: flex; gap: 8px; }

        .nav a {
            color: rgba(230, 230, 250, 0.95); text-decoration: none;
            padding: 10px 18px; border-radius: 10px;
            font-size: 0.95rem; font-weight: 500; transition: all 0.2s;
        }

        .nav a:hover { 
            color: #fff; 
            background: rgba(255, 255, 255, 0.15); 
            transform: translateY(-1px);
            backdrop-filter: blur(10px);
        }
        .nav a.active { 
            color: #fff; 
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8), rgba(129, 140, 248, 0.8));
            box-shadow: 0 2px 10px rgba(99, 102, 241, 0.25);
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .hero {
            padding: 60px 24px 40px;
            text-align: center;
            background: transparent;
        }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            background: var(--accent-light);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-size: 0.8rem; color: #818cf8; margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 2.8rem; font-weight: 800; margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #dbeafe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 3px 12px rgba(0, 0, 0, 0.7);
        }

        .hero p { 
            color: rgba(230, 230, 250, 0.95); 
            font-size: 1.2rem; 
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        .filter-section {
            padding: 20px 24px; position: sticky; top: 64px; z-index: 90;
            background: transparent; border-bottom: 1px solid var(--border);
        }

        .filter-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }

        .filter-btn {
            padding: 12px 22px; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.1); /* 更透明的背景 */
            color: rgba(240, 240, 255, 0.95); font-size: 0.95rem;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(15px); /* 增強毛玻璃 */
        }

        .filter-btn:hover { 
            border-color: rgba(255, 255, 255, 0.3); 
            color: #fff; 
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }
        .filter-btn.active { 
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8), rgba(129, 140, 248, 0.8)); 
            border-color: rgba(255, 255, 255, 0.3); 
            color: #fff; 
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .filter-btn .count {
            background: rgba(255,255,255,0.2); padding: 2px 8px;
            border-radius: 10px; font-size: 0.75rem;
        }

        .news-section { max-width: 1400px; margin: 0 auto; padding: 32px 24px; background: transparent; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.03); /* 幾乎完全透明 */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px; overflow: hidden;
            transition: all 0.3s ease; cursor: pointer;
            text-decoration: none; display: block;
            backdrop-filter: blur(25px); /* 增強毛玻璃效果，讓背景圖透過 */
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.15);
        }

        .news-card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px);
            box-shadow: 0 8px 35px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08); /* 懸停時稍微增加不透明度 */
            backdrop-filter: blur(30px); /* 懸停時增強毛玻璃效果 */
        }

        .news-card-image {
            height: 180px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; position: relative;
            background: transparent; /* 完全透明 */
        }

        .news-card-category {
            position: absolute; top: 12px; left: 12px;
            padding: 6px 14px; 
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.85), rgba(129, 140, 248, 0.85));
            border-radius: 8px; font-size: 0.75rem; font-weight: 700;
            color: #fff; z-index: 1;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4); /* 增強陰影 */
            border: 1px solid rgba(255, 255, 255, 0.3); /* 更明顯的邊框 */
            backdrop-filter: blur(5px); /* 添加毛玻璃效果 */
        }

        .news-card-body {
            padding: 20px;
            background: transparent; /* 確保內容區域也是透明的 */
        }

        .news-card-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;
            line-height: 1.5; color: rgba(255, 255, 255, 0.98); /* 更白的文字 */
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8); /* 增強文字陰影，提高對比度 */
        }

        .news-card-desc {
            font-size: 0.9rem; color: rgba(240, 240, 255, 0.95); /* 更亮的描述文字 */
            line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 16px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6); /* 增強文字陰影 */
        }

        .news-card-meta {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 16px; border-top: 1px solid var(--border);
        }

        .news-card-source {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; color: var(--text-tertiary);
        }

        .news-card-date { font-size: 0.8rem; color: var(--text-tertiary); }

        .news-card.featured { grid-column: span 2; }
        .news-card.featured .news-card-image { 
            height: 280px; 
            background: transparent; /* 保持一致 */
        }
        .news-card.featured .news-card-title { font-size: 1.4rem; }

        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 24px; color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .last-update {
            text-align: center; padding: 20px;
            color: rgba(140, 140, 160, 0.8); 
            font-size: 0.85rem;
            background: rgba(15, 15, 20, 0.6);
            border-radius: 12px;
            margin: 20px auto;
            max-width: 600px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .footer {
            padding: 40px 24px; text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            margin-top: 40px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
        }

        .footer p { 
            color: rgba(160, 160, 180, 0.8); 
            font-size: 0.9rem; 
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .nav { display: none; }
            .hero h1 { font-size: 1.8rem; }
            .news-grid { grid-template-columns: 1fr; }
            .news-card.featured { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="home.html" class="logo">
                <div class="logo-icon">📖</div>
                科技修真傳
            </a>
            <nav class="nav">
                <a href="home.html">首頁</a>
                <a href="chapters.html">章節</a>
                <a href="news.html" class="active">AI 新聞</a>
                <a href="finance.html">財經</a>
                <a href="https://itv.kofhk.com/" target="_blank">ITV</a>
                <a href="author.html">作者</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-badge">🤖 AI 最新資訊</div>
        <h1>人工智能新聞</h1>
        <p>追蹤全球 AI 發展動態 · 每日更新 · 涵蓋模型、研究、業界消息</p>
    </section>

    <div class="filter-section">
        <div class="filter-inner">
            <button class="filter-btn active" data-category="all">
                🔥 全部 <span class="count" id="count-all">-</span>
            </button>
            <button class="filter-btn" data-category="model">
                🤖 AI模型 <span class="count" id="count-model">-</span>
            </button>
            <button class="filter-btn" data-category="research">
                🔬 研究 <span class="count" id="count-research">-</span>
            </button>
            <button class="filter-btn" data-category="industry">
                💼 業界 <span class="count" id="count-industry">-</span>
            </button>
            <button class="filter-btn" data-category="tools">
                🛠️ 工具 <span class="count" id="count-tools">-</span>
            </button>
        </div>
    </div>

    <main class="news-section">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在載入新聞...</p>
        </div>
        <div class="news-grid" id="newsGrid" style="display:none;"></div>
    </main>

    <div class="last-update" id="lastUpdate"></div>

    <footer class="footer">
        <p>版權所有 © 2026 科技修真傳 | 作者：大肥喵 | AI 新聞每日更新</p>
    </footer>

    <script>
        const CATEGORY_ICONS = {
            model: '🤖', research: '🔬', industry: '💼', tools: '🛠️'
        };

        const CATEGORY_NAMES = {
            model: 'AI模型', research: '研究突破', industry: '業界動態', tools: '工具更新'
        };



        let allNews = [];

        function timeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diff = Math.floor((now - date) / 1000);

            if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
            if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
            return date.toLocaleDateString('zh-TW');
        }

        function createNewsCard(item, isFeatured = false) {
            const categoryName = CATEGORY_NAMES[item.category] || '其他';
            const icon = CATEGORY_ICONS[item.category] || '📰';

            return `
                <a href="${item.link}" target="_blank" class="news-card ${isFeatured ? 'featured' : ''}" data-category="${item.category}">
                    <div class="news-card-image">
                        <span class="news-card-category">${icon} ${categoryName}</span>
                        <span style="font-size: ${isFeatured ? '4rem' : '2.5rem'}">${icon}</span>
                    </div>
                    <div class="news-card-body">
                        <h3 class="news-card-title">${item.title}</h3>
                        <p class="news-card-desc">${item.description || '點擊閱讀全文...'}</p>
                        <div class="news-card-meta">
                            <span class="news-card-date">${item.pubDate ? timeAgo(item.pubDate) : '最近更新'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderNews(category = 'all') {
            const grid = document.getElementById('newsGrid');
            const filtered = category === 'all'
                ? allNews
                : allNews.filter(n => n.category === category);

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:60px;">暫無此分類新聞</p>';
                return;
            }

            // 第一條為 featured
            let html = createNewsCard(filtered[0], true);
            for (let i = 1; i < filtered.length; i++) {
                html += createNewsCard(filtered[i]);
            }
            grid.innerHTML = html;
        }

        function updateCounts() {
            document.getElementById('count-all').textContent = allNews.length;
            document.getElementById('count-model').textContent = allNews.filter(n => n.category === 'model').length;
            document.getElementById('count-research').textContent = allNews.filter(n => n.category === 'research').length;
            document.getElementById('count-industry').textContent = allNews.filter(n => n.category === 'industry').length;
            document.getElementById('count-tools').textContent = allNews.filter(n => n.category === 'tools').length;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderNews(btn.dataset.category);
            });
        });

        // Load news
        async function loadNews() {
            try {
                const response = await fetch('news-data.json');
                const data = await response.json();
                allNews = data.news || [];

                updateCounts();
                renderNews();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('newsGrid').style.display = 'grid';

                if (data.lastUpdate) {
                    document.getElementById('lastUpdate').textContent =
                        `最後更新: ${new Date(data.lastUpdate).toLocaleString('zh-TW')}`;
                }
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('loading').innerHTML =
                    '<p style="color:#ef4444">新聞載入失敗，請稍後重試</p>';
            }
        }

        loadNews();
    </script>
</body>
</html>
