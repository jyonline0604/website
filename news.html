<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 新聞 - 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #606070;
            --accent: #6366f1;
            --accent-light: rgba(99, 102, 241, 0.15);
            --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --border: rgba(255,255,255,0.08);
            --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }

        .header-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            height: 64px;
        }

        .logo {
            font-size: 1.3rem; font-weight: 700; color: #fff;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--gradient); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }

        .nav { display: flex; gap: 8px; }

        .nav a {
            color: var(--text-secondary); text-decoration: none;
            padding: 8px 16px; border-radius: 8px;
            font-size: 0.9rem; transition: all 0.2s;
        }

        .nav a:hover { color: #fff; background: var(--accent-light); }
        .nav a.active { color: #fff; background: var(--accent); }

        .hero {
            padding: 60px 24px 40px;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            background: var(--accent-light);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            font-size: 0.8rem; color: #818cf8; margin-bottom: 20px;
        }

        .hero h1 {
            font-size: 2.5rem; font-weight: 700; margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero p { color: var(--text-secondary); font-size: 1.1rem; }

        .filter-section {
            padding: 20px 24px; position: sticky; top: 64px; z-index: 90;
            background: var(--bg-primary); border-bottom: 1px solid var(--border);
        }

        .filter-inner {
            max-width: 1400px; margin: 0 auto;
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }

        .filter-btn {
            padding: 10px 20px; border-radius: 10px;
            border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); font-size: 0.9rem;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px;
        }

        .filter-btn:hover { border-color: var(--accent); color: #fff; }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .filter-btn .count {
            background: rgba(255,255,255,0.2); padding: 2px 8px;
            border-radius: 10px; font-size: 0.75rem;
        }

        .news-section { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .news-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden;
            transition: all 0.3s ease; cursor: pointer;
            text-decoration: none; display: block;
        }

        .news-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: var(--card-shadow);
        }

        .news-card-image {
            height: 180px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; position: relative;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--accent-light));
        }

        .news-card-image::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        .news-card-category {
            position: absolute; top: 12px; left: 12px;
            padding: 4px 12px; background: var(--accent);
            border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            color: #fff; z-index: 1;
        }

        .news-card-body { padding: 20px; }

        .news-card-title {
            font-size: 1.1rem; font-weight: 600; margin-bottom: 12px;
            line-height: 1.5; color: #fff;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }

        .news-card-desc {
            font-size: 0.9rem; color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 16px;
        }

        .news-card-meta {
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 16px; border-top: 1px solid var(--border);
        }

        .news-card-source {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; color: var(--text-tertiary);
        }

        .news-card-date { font-size: 0.8rem; color: var(--text-tertiary); }

        .news-card.featured { grid-column: span 2; }
        .news-card.featured .news-card-image { height: 280px; }
        .news-card.featured .news-card-title { font-size: 1.4rem; }

        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 24px; color: var(--text-secondary);
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .last-update {
            text-align: center; padding: 16px;
            color: var(--text-tertiary); font-size: 0.85rem;
        }

        .footer {
            padding: 40px 24px; text-align: center;
            border-top: 1px solid var(--border); margin-top: 40px;
        }

        .footer p { color: var(--text-tertiary); font-size: 0.9rem; }

        @media (max-width: 768px) {
            .nav { display: none; }
            .hero h1 { font-size: 1.8rem; }
            .news-grid { grid-template-columns: 1fr; }
            .news-card.featured { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="home.html" class="logo">
                <div class="logo-icon">📖</div>
                科技修真傳
            </a>
            <nav class="nav">
                <a href="home.html">首頁</a>
                <a href="chapters.html">章節</a>
                <a href="news.html" class="active">AI 新聞</a>
                <a href="#">作者</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="hero-badge">🤖 AI 最新資訊</div>
        <h1>人工智能新聞</h1>
        <p>追蹤全球 AI 發展動態 · 每日更新 · 涵蓋模型、研究、業界消息</p>
    </section>

    <div class="filter-section">
        <div class="filter-inner">
            <button class="filter-btn active" data-category="all">
                🔥 全部 <span class="count" id="count-all">-</span>
            </button>
            <button class="filter-btn" data-category="model">
                🤖 AI模型 <span class="count" id="count-model">-</span>
            </button>
            <button class="filter-btn" data-category="research">
                🔬 研究 <span class="count" id="count-research">-</span>
            </button>
            <button class="filter-btn" data-category="industry">
                💼 業界 <span class="count" id="count-industry">-</span>
            </button>
            <button class="filter-btn" data-category="tools">
                🛠️ 工具 <span class="count" id="count-tools">-</span>
            </button>
        </div>
    </div>

    <main class="news-section">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>正在載入新聞...</p>
        </div>
        <div class="news-grid" id="newsGrid" style="display:none;"></div>
    </main>

    <div class="last-update" id="lastUpdate"></div>

    <footer class="footer">
        <p>版權所有 © 2026 科技修真傳 | 作者：大肥喵 | AI 新聞每日更新</p>
    </footer>

    <script>
        const CATEGORY_ICONS = {
            model: '🤖', research: '🔬', industry: '💼', tools: '🛠️'
        };

        const CATEGORY_NAMES = {
            model: 'AI模型', research: '研究突破', industry: '業界動態', tools: '工具更新'
        };

        const CATEGORY_COLORS = {
            model: 'linear-gradient(135deg, #2d1b4e, #1a1a25)',
            research: 'linear-gradient(135deg, #0f4c3a, #1a1a25)',
            industry: 'linear-gradient(135deg, #4a1942, #1a1a25)',
            tools: 'linear-gradient(135deg, #1a1a25, #0f4c3a)'
        };

        let allNews = [];

        function timeAgo(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diff = Math.floor((now - date) / 1000);

            if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
            if (diff < 604800) return Math.floor(diff / 86400) + ' 天前';
            return date.toLocaleDateString('zh-TW');
        }

        function createNewsCard(item, isFeatured = false) {
            const categoryName = CATEGORY_NAMES[item.category] || '其他';
            const icon = CATEGORY_ICONS[item.category] || '📰';
            const bgColor = CATEGORY_COLORS[item.category] || 'linear-gradient(135deg, #1a1a25, #2d1b4e)';

            return `
                <a href="${item.link}" target="_blank" class="news-card ${isFeatured ? 'featured' : ''}" data-category="${item.category}">
                    <div class="news-card-image" style="background: ${bgColor}">
                        <span class="news-card-category">${icon} ${categoryName}</span>
                        <span style="font-size: ${isFeatured ? '4rem' : '2.5rem'}">${icon}</span>
                    </div>
                    <div class="news-card-body">
                        <h3 class="news-card-title">${item.title}</h3>
                        <p class="news-card-desc">${item.description || '點擊閱讀全文...'}</p>
                        <div class="news-card-meta">
                            <span class="news-card-date">${item.pubDate ? timeAgo(item.pubDate) : '最近更新'}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderNews(category = 'all') {
            const grid = document.getElementById('newsGrid');
            const filtered = category === 'all'
                ? allNews
                : allNews.filter(n => n.category === category);

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:60px;">暫無此分類新聞</p>';
                return;
            }

            // 第一條為 featured
            let html = createNewsCard(filtered[0], true);
            for (let i = 1; i < filtered.length; i++) {
                html += createNewsCard(filtered[i]);
            }
            grid.innerHTML = html;
        }

        function updateCounts() {
            document.getElementById('count-all').textContent = allNews.length;
            document.getElementById('count-model').textContent = allNews.filter(n => n.category === 'model').length;
            document.getElementById('count-research').textContent = allNews.filter(n => n.category === 'research').length;
            document.getElementById('count-industry').textContent = allNews.filter(n => n.category === 'industry').length;
            document.getElementById('count-tools').textContent = allNews.filter(n => n.category === 'tools').length;
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderNews(btn.dataset.category);
            });
        });

        // Load news
        async function loadNews() {
            try {
                const response = await fetch('news-data.json');
                const data = await response.json();
                allNews = data.news || [];

                updateCounts();
                renderNews();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('newsGrid').style.display = 'grid';

                if (data.lastUpdate) {
                    document.getElementById('lastUpdate').textContent =
                        `最後更新: ${new Date(data.lastUpdate).toLocaleString('zh-TW')}`;
                }
            } catch (error) {
                console.error('載入失敗:', error);
                document.getElementById('loading').innerHTML =
                    '<p style="color:#ef4444">新聞載入失敗，請稍後重試</p>';
            }
        }

        loadNews();
    </script>
</body>
</html>
