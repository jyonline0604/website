<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第31章：宇宙和平 - 科技修真傳 - 科技修真傳 - 科技修真傳</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFBFC;
            --text: #1F2937;
            --accent: #6366F1;
            --border: #E5E7EB;
            --panel-bg: #FFFFFF;
            --font-size: 18px;
            --line-height: 1.8;
        }

        [data-theme="light"] {
            --bg: #FAFBFC;
            --text: #1F2937;
            --border: #E5E7EB;
            --panel-bg: #FFFFFF;
        }

        [data-theme="sepia"] {
            --bg: #F4ECD8;
            --text: #5C4B37;
            --border: #D4C4A8;
            --panel-bg: #EDE4D0;
        }

        [data-theme="sky"] {
            --bg: #E8F4FC;
            --text: #2C5282;
            --border: #BEE3F8;
            --panel-bg: #E8F4FC;
        }

        [data-theme="green"] {
            --bg: #E8F5E9;
            --text: #2E5A3A;
            --border: #A5D6A7;
            --panel-bg: #E8F5E9;
        }

        [data-theme="pink"] {
            --bg: #FCE4EC;
            --text: #880E4F;
            --border: #F48FB1;
            --panel-bg: #FCE4EC;
        }

        [data-theme="dark"] {
            --bg: #1A1F26;
            --text: #E5E7EB;
            --border: #374151;
            --panel-bg: #242B35;
        }

        [data-theme="navy"] {
            --bg: #1A202C;
            --text: #E2E8F0;
            --border: #4A5568;
            --panel-bg: #2D3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Serif TC', serif;
            background: var(--bg);
            color: var(--text);
            line-height: var(--line-height);
            transition: background 0.3s, color 0.3s;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }

        .header a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .header a:hover {
            background: var(--border);
        }

        .chapter-title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        /* Main Content */
        .main {
            max-width: 720px;
            margin: 0 auto;
            padding: 80px 24px 80px;
        }

        .chapter-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .chapter-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }

        .content {
            text-align: justify;
            font-size: var(--font-size);
            line-height: var(--line-height);
        }

        .content p {
            margin-bottom: 1.2em;
            text-indent: 2em;
        }

        .content p:first-of-type::first-letter {
            font-size: 1.3em;
            font-weight: 700;
            float: left;
            line-height: 1;
            margin-right: 2px;
            color: var(--accent);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }

        .bottom-nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .bottom-nav a:hover {
            background: var(--border);
        }

        .nav-center {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .settings-modal {
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            background: var(--panel-bg);
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .settings-modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--border);
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(85vh - 140px);
        }

        .setting-section {
            margin-bottom: 24px;
        }

        .setting-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .theme-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.05);
        }

        .theme-btn.active {
            border-color: var(--accent);
        }

        .theme-btn.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .theme-btn.light { background: #FAFBFC; }
        .theme-btn.sepia { background: #F4ECD8; }
        .theme-btn.sky { background: #E8F4FC; }
        .theme-btn.green { background: #E8F5E9; }
        .theme-btn.pink { background: #FCE4EC; }
        .theme-btn.dark { background: #2D3748; }
        .theme-btn.navy { background: #1A202C; }

        .font-size-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .font-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .font-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .font-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            -webkit-appearance: none;
            appearance: none;
        }

        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .font-preview {
            text-align: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            margin-top: 12px;
            font-size: var(--font-size);
        }

        .toggle-group {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 16px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .modal-footer button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-default {
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }

        .btn-default:hover {
            background: var(--border);
        }

        .btn-primary {
            border: none;
            background: #10B981;
            color: white;
        }

        .btn-primary:hover {
            background: #059669;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .main {
                padding: 72px 16px 80px;
            }

            .chapter-header h1 {
                font-size: 1.4rem;
            }

            .theme-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="chapters.html">← 章節</a>
        <span class="chapter-title">第31章</span>
        <div class="header-right">
            <button class="icon-btn" onclick="openSettings()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <header class="chapter-header">
            <h1>第31章：宇宙和平 - 科技修真傳 - 科技修真傳</h1>
        </header>
        <div class="content">
            <p>內容載入中...</p>

        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="chapter-30.html">← 上一章</a>
        <div class="nav-center">
            <button class="nav-btn" onclick="prevChapter()">◀</button>
            <span id="progress">0%</span>
            <button class="nav-btn" onclick="nextChapter()">▶</button>
        </div>
        <a href="chapter-32.html">下一章 →</a>
    </nav>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="settings-modal">
            <div class="modal-header">
                <h3>設置</h3>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            <div class="modal-body">
                <!-- Theme -->
                <div class="setting-section">
                    <div class="setting-label">主題模式</div>
                    <div class="theme-grid">
                        <button class="theme-btn light" data-theme="light" onclick="setTheme('light')"></button>
                        <button class="theme-btn sepia" data-theme="sepia" onclick="setTheme('sepia')"></button>
                        <button class="theme-btn sky" data-theme="sky" onclick="setTheme('sky')"></button>
                        <button class="theme-btn green" data-theme="green" onclick="setTheme('green')"></button>
                        <button class="theme-btn pink" data-theme="pink" onclick="setTheme('pink')"></button>
                        <button class="theme-btn dark" data-theme="dark" onclick="setTheme('dark')"></button>
                        <button class="theme-btn navy" data-theme="navy" onclick="setTheme('navy')"></button>
                    </div>
                </div>

                <!-- Font Size -->
                <div class="setting-section">
                    <div class="setting-label">字體大小</div>
                    <div class="font-size-control">
                        <button class="font-btn" onclick="adjustFontSize(-2)">A-</button>
                        <input type="range" class="font-slider" id="fontSlider" min="14" max="28" value="18" oninput="setFontSize(this.value)">
                        <button class="font-btn" onclick="adjustFontSize(2)">A+</button>
                    </div>
                    <div class="font-preview" id="fontPreview">科技修真傳 - 示範文字</div>
                </div>

                <!-- Reading Progress -->
                <div class="setting-section">
                    <div class="setting-label">閱讀進度</div>
                    <div class="progress-info">
                        <span>已讀</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                        </div>
                        <span id="progressPercent">0%</span>
                    </div>
                </div>

                <!-- Chapter Navigation -->
                <div class="setting-section">
                    <div class="setting-label">章節導航</div>
                    <div style="display: flex; gap: 12px;">
                        <button class="nav-btn" style="flex:1" onclick="prevChapter(); closeSettings();">◀ 上一章</button>
                        <button class="nav-btn" style="flex:1" onclick="nextChapter(); closeSettings();">下一章 ▶</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-default" onclick="resetSettings()">恢復默認</button>
                <button class="btn-primary" onclick="closeSettings()">確定</button>
            </div>
        </div>
    </div>

    <script>
        // Settings
        const DEFAULT_SETTINGS = {
            theme: 'light',
            fontSize: 18
        };

        let settings = { ...DEFAULT_SETTINGS };

        // Load settings from localStorage
        function loadSettings() {
            const saved = localStorage.getItem('reading-settings');
            if (saved) {
                settings = JSON.parse(saved);
            }
            applySettings();
        }

        function saveSettings() {
            localStorage.setItem('reading-settings', JSON.stringify(settings));
        }

        function applySettings() {
            document.body.setAttribute('data-theme', settings.theme);
            document.documentElement.style.setProperty('--font-size', settings.fontSize + 'px');
            
            // Update theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === settings.theme);
            });
            
            // Update font slider
            document.getElementById('fontSlider').value = settings.fontSize;
            document.getElementById('fontPreview').style.fontSize = settings.fontSize + 'px';
        }

        function setTheme(theme) {
            settings.theme = theme;
            saveSettings();
            applySettings();
        }

        function setFontSize(size) {
            settings.fontSize = parseInt(size);
            saveSettings();
            applySettings();
        }

        function adjustFontSize(delta) {
            const newSize = Math.min(28, Math.max(14, settings.fontSize + delta));
            setFontSize(newSize);
        }

        function resetSettings() {
            settings = { ...DEFAULT_SETTINGS };
            saveSettings();
            applySettings();
        }

        // Modal
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
            updateProgress();
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('settingsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSettings();
            }
        });

        // Chapter Navigation
        function prevChapter() {
            window.location.href = 'chapter-30.html';
        }

        function nextChapter() {
            window.location.href = 'chapter-32.html';
        }

        // Reading Progress
        function updateProgress() {
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollTop = window.scrollY;
            const progress = scrollHeight > 0 ? Math.round((scrollTop / scrollHeight) * 100) : 0;
            
            document.getElementById('progress').textContent = progress + '%';
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';
        }

        window.addEventListener('scroll', updateProgress);

        // Initialize
        loadSettings();
        updateProgress();
    </script>
</body>
</html>
